【当前步骤任务】 重写GetOptimalLockOnPosition函数，实现Socket查找和偏移逻辑。

【具体执行】


1.打开CameraControlComponent.cpp文件


2.找到GetOptimalLockOnPosition函数（约第1200-1250行）


3.完全替换函数实现：

FVector UCameraControlComponent::GetOptimalLockOnPosition(AActor* Target) const
{
    if (!Target) return FVector::ZeroVector;
    
    FVector BaseLocation = FVector::ZeroVector;
    
    // ========== Socket系统定位 ==========
    if (bUseSocketSystem)
    {
        USkeletalMeshComponent* SkeletalMesh = Target->FindComponentByClass<USkeletalMeshComponent>();
        if (SkeletalMesh)
        {
            // 优先尝试主Socket
            if (SkeletalMesh->DoesSocketExist(PrimarySocketName))
            {
                BaseLocation = SkeletalMesh->GetSocketLocation(PrimarySocketName);
                
                if (bEnableCameraDebugLogs)
                {
                    UE_LOG(LogTemp, Warning, TEXT("Using Primary Socket: %s"), *PrimarySocketName.ToString());
                }
            }
            else
            {
                // 依次尝试备用Socket列表
                for (const FName& SocketName : FallbackSocketNames)
                {
                    if (SkeletalMesh->DoesSocketExist(SocketName))
                    {
                        BaseLocation = SkeletalMesh->GetSocketLocation(SocketName);
                        
                        if (bEnableCameraDebugLogs)
                        {
                            UE_LOG(LogTemp, Warning, TEXT("Using Fallback Socket: %s"), *SocketName.ToString());
                        }
                        break;
                    }
                }
            }
        }
    }
    
    // 如果Socket系统未找到位置，使用Actor中心作为后备
    if (BaseLocation.IsZero())
    {
        BaseLocation = Target->GetActorLocation();
        
        if (bEnableCameraDebugLogs)
        {
            UE_LOG(LogTemp, Warning, TEXT("No Socket found, using Actor Location"));
        }
    }
    
    // ========== 应用偏移值 ==========
    FVector FinalLocation = BaseLocation;
    
    if (bUseCameraSpaceOffset && OwnerCharacter)
    {
        // 相机空间偏移：偏移相对于相机朝向
        APlayerController* PC = Cast<APlayerController>(OwnerCharacter->GetController());
        if (PC)
        {
            FRotator CameraRot = PC->GetControlRotation();
            FRotationMatrix RotMatrix(CameraRot);
            
            // 获取相机的方向向量
            FVector Forward = RotMatrix.GetUnitAxis(EAxis::X);  // 前后
            FVector Right = RotMatrix.GetUnitAxis(EAxis::Y);    // 左右
            FVector Up = FVector::UpVector;                     // 上下始终使用世界上方
            
            // 应用XYZ偏移
            FinalLocation += Forward * TargetLocationOffset.X;  // X = 前后偏移
            FinalLocation += Right * TargetLocationOffset.Y;    // Y = 左右偏移
            FinalLocation += Up * TargetLocationOffset.Z;       // Z = 上下偏移
        }
    }
    else
    {
        // 世界空间偏移：直接加上偏移值
        FinalLocation += TargetLocationOffset;
    }
    
    return FinalLocation;
}

