void UCameraControlComponent::TickComponent(float DeltaTime, ELevelTick TickType, FActorComponentTickFunction* ThisTickFunction)
{
    Super::TickComponent(DeltaTime, TickType, ThisTickFunction);
    
    // ... 现有代码 ...
    
    // ========== Socket位置调试可视化 ==========
    #if WITH_EDITOR
    if (bEnableCameraDebugLogs && CurrentLockOnTarget)
    {
        // 获取并显示锁定点位置
        FVector LockPosition = GetOptimalLockOnPosition(CurrentLockOnTarget);
        
        // 绘制锁定点球体（红色）
        DrawDebugSphere(
            GetWorld(), 
            LockPosition, 
            20.0f,           // 半径
            12,              // 段数
            FColor::Red,     // 颜色
            false,           // 持久化
            -1.0f,           // 生命周期
            0,               // 深度优先级
            2.0f             // 线条粗细
        );
        
        // 绘制从相机到锁定点的线（黄色）
        if (OwnerCharacter)
        {
            APlayerController* PC = Cast<APlayerController>(OwnerCharacter->GetController());
            if (PC && PC->PlayerCameraManager)
            {
                FVector CameraLocation = PC->PlayerCameraManager->GetCameraLocation();
                DrawDebugLine(
                    GetWorld(),
                    CameraLocation,
                    LockPosition,
                    FColor::Yellow,
                    false,
                    -1.0f,
                    0,
                    1.0f
                );
            }
        }
        
        // 显示当前使用的Socket名称
        if (GEngine)
        {
            GEngine->AddOnScreenDebugMessage(
                -1, 
                0.0f, 
                FColor::Cyan, 
                FString::Printf(TEXT("Lock Socket: %s | Offset: %s"), 
                    *PrimarySocketName.ToString(), 
                    *TargetLocationOffset.ToString())
            );
        }
    }
    #endif
}

