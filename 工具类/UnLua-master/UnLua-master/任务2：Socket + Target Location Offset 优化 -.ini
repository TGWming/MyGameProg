// ========== 运行时调整函数实现 ==========
void UCameraControlComponent::SetTargetLocationOffset(FVector NewOffset)
{
    TargetLocationOffset = NewOffset;
    
    if (bEnableCameraDebugLogs)
    {
        UE_LOG(LogTemp, Warning, TEXT("Target Location Offset updated to: %s"), *NewOffset.ToString());
    }
}

void UCameraControlComponent::SetPrimarySocketName(FName NewSocketName)
{
    PrimarySocketName = NewSocketName;
    
    if (bEnableCameraDebugLogs)
    {
        UE_LOG(LogTemp, Warning, TEXT("Primary Socket Name updated to: %s"), *NewSocketName.ToString());
    }
}

void UCameraControlComponent::SetUseCameraSpaceOffset(bool bUseCameraSpace)
{
    bUseCameraSpaceOffset = bUseCameraSpace;
    
    if (bEnableCameraDebugLogs)
    {
        UE_LOG(LogTemp, Warning, TEXT("Camera Space Offset mode: %s"), bUseCameraSpace ? TEXT("Enabled") : TEXT("Disabled"));
    }
}

void UCameraControlComponent::AddFallbackSocket(FName SocketName)
{
    if (!SocketName.IsNone() && !FallbackSocketNames.Contains(SocketName))
    {
        FallbackSocketNames.Add(SocketName);
    }
}

void UCameraControlComponent::ClearFallbackSockets()
{
    FallbackSocketNames.Empty();
}

