



重点：不修改目前锁定，切换锁定的逻辑和方式。





==========================需要实现的部分=========================================================

-镜头的DEADZONE是通过距离判断，而不是夹角阈值。

-从UI-ONLY最接近敌人身边这个范围内，相机跟随切换锁定对象的平滑转移是渐进增大或减小，线性表现，核心就是当逐渐从DEADZONE（UIONLY）缓慢移动到敌人过程中，当下测试我是锁定状态前行，这样是可以感觉到切换锁定下，镜头跟随是逐渐从小角度跟随到大角度跟随的。

-CAMERA LAG在组件内作为BOOL必须要暴露给PIE让设计师可编辑

-手动解除锁定（即R3或MIDDLE MOUSE BUTTON），相机不需要重置到锁定前的坐标，直接停留解锁前最后这个即可，或者DEFAULT硬编码值，但解锁后玩家可通过手动控制自由，也可手动回归到之前“锁定前的相机坐标位置”。这里的关键效果是，锁定与解锁之间的无缝衔接感增强。

-另外锁定后，相机的transformer Z一定会有所上升，让玩家看清楚敌人，对准的方向有点类似胸口socket偏下，也就是介于胸口和腿部之间的位置，通过基于敌人socket+固定偏移值实现的。然后相机的spring arm也必定会通过接近敌人，远离敌人，以及敌人体型大小会有一定的自适应自动调整。

-相机的spring arm的自适应部分应该与相机transformer区分开，优化阶段需要分拆成两个独立步骤，spring arm的判定需要有一套更加详细的判定条件状态（目前先不执行这个任务，但需要提前做好可拓展部分让后续计算和实现兼容进来）

-以socket作为基点，加上可配置offset，向下（或者灵活数值，例如正负值来决定），暴露offset参数让设计师可以在编辑器内修改，并且这个offset参数支持让每一个敌人可以实例化定制，不强行所有实例统一。

-敌人在玩家身后，相机对准敌人玩家角色背对敌人，仍可锁定，手动输入锁定后，进入锁定状态，玩家模型自动转身对齐

