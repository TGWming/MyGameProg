# 相机系统重构评估与实施计划

## 一、现状分析与方向评估

### 1.1 清除冗余组件的正确性评估
**正确的清除方向：**
- ✅ **CameraPresetComponent** - 预设系统过度设计，与核心需求无关
- ✅ **EnemyCameraConfigComponent** - 每个敌人配置相机过于复杂，应该由相机系统统一处理
- ✅ **CameraDebugComponent** - 可选保留用于开发调试

**需要保留但简化：**
- ⚠️ **AdvancedCameraSettings** - 保留基础字段（敌人体型、距离自适应）
- ⚠️ **EnemySizeCategory** - 简化为3级（Small/Medium/Large）

### 1.2 与Cinemachine对标的差距
当前系统缺失的核心功能：
1. **优先级系统** - 没有明确的相机行为优先级管理
2. **状态机** - 缺少清晰的相机状态转换管理
3. **混合系统** - 缺少多个相机行为的混合权重
4. **约束系统** - 缺少相机位置/旋转的约束器

## 二、核心架构设计方向

### 2.1 优先级系统设计
```
优先级层级（从高到低）：
1. 玩家手动输入 (最高优先级)
2. 锁定系统 (Socket + Offset)
3. 敌人动画状态响应
4. 敌人体型自适应
5. 距离自适应 (最低优先级)
```

### 2.2 相机参数影响链
```
SpringArm Length = BaseLength × SizeMultiplier × DistanceMultiplier × AnimationMultiplier
Camera Position = SocketLocation + FixedOffset + AdaptiveOffset
Camera Rotation = LookAtRotation × DampingFactor
```

